# .github/workflows/ci.yml - Automated test run pipeline on main branch updates
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Backend & Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository source
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Run Backend test suite
        run: |
          cd backend
          npm ci
          npm test

      - name: Run Frontend test suite
        run: |
          cd frontend
          npm ci
          npm test -- --watchAll=false

  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository source
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Build frontend for E2E
        run: |
          cd frontend
          npm ci
          REACT_APP_API_URL=http://127.0.0.1:5000 npm run build

      - name: Install E2E dependencies
        run: |
          cd e2e
          npm ci

      - name: Install Playwright browsers
        run: |
          cd e2e
          npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: |
          cd e2e
          npx playwright test

